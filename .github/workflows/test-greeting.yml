name: Test Greeting

on:
  push:
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  send:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5
        with:
          submodules: recursive

      - uses: astral-sh/setup-uv@v7.6.0
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync

      - name: Send test greeting
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_APPID }}
          WECHAT_SECRET: ${{ secrets.WECHAT_SECRET }}
          WECHAT_USER_ID: ${{ secrets.WECHAT_TEST_USER_ID }}
          WECHAT_TEMPLATE_ID: ${{ secrets.WECHAT_TEMPLATE_ID }}
          PLUS_SENTENCE: ${{ secrets.PLUS_SENTENCE }}
          DEFAULT_SENTENCE: ${{ secrets.DEFAULT_SENTENCE }}
          CITIES: ${{ secrets.CITIES }}
          LOCAL_TIMEZONE: ${{ secrets.LOCAL_TIMEZONE }}
          REMOTE_TIMEZONE: ${{ secrets.REMOTE_TIMEZONE }}
        run: uv run python -m ybot.send_now
